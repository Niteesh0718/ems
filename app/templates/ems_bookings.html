{% extends 'navbar.html' %}

{% block content %}

<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #7f5cff, #2b1f4a 60%);
  }

  .bookings-wrapper {
    max-width: 1000px;
    margin: 40px auto;
    padding: 30px;
  }

  .bookings-card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  }

  .bookings-title {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
    color: #0f172a;
    letter-spacing: 1px;
  }

  .bookings-title::after {
    content: "";
    display: block;
    width: 60px;
    height: 4px;
    margin: 10px auto 0;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #3b82f6);
  }
</style>

<div class="bookings-wrapper">
  <div class="bookings-card">
    <h1 class="bookings-title">My Bookings</h1>

    <!-- You can later loop bookings here -->
    <p style="text-align:center; color:#475569;">
      Your booked events will appear here.
    </p>

  </div>
</div>

{% endblock %}
