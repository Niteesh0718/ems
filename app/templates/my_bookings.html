{% include "navbar.html" %}

<style>
  .bookings-page {
    max-width: 1000px;
    margin: 30px auto 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }
  .ticket-card {
    background: #fff;
    border: 2px solid #000;
    border-radius: 16px;
    overflow: hidden;
  }
  .ticket-header {
    background: #111;
    color: #fff;
    padding: 10px 14px;
    font-weight: 700;
    text-align: center;
  }
  .ticket-image img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }
  .ticket-body { padding: 14px 16px 16px; }
  .ticket-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .ticket-meta { font-size: 14px; margin: 4px 0; }
  .ticket-footer {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #aaa;
    font-size: 12px;
    color: #555;
  }
  .empty { text-align: center; color: #777; grid-column: 1 / -1; margin-top: 60px; }
</style>

<div class="bookings-page">
  {% if bookings %}
    {% for b in bookings %}
      <div class="ticket-card">
        <div class="ticket-header">My Ticket</div>
        <div class="ticket-image">
          <img src="{{ b.event_img|default:'https://via.placeholder.com/600x300' }}">
        </div>
        <div class="ticket-body">
          <div class="ticket-title">{{ b.event_name }}</div>
          <div class="ticket-meta">📅 {{ b.event_date }}</div>
          <div class="ticket-meta">⏰ {{ b.event_time }}</div>
          <div class="ticket-meta">👤 {{ b.name }}</div>
          <div class="ticket-meta">📧 {{ b.email }}</div>
          <div class="ticket-footer">Booked at: {{ b.booked_at }}</div>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <div class="empty">You haven’t booked any tickets yet 🎟️</div>
  {% endif %}
</div>
