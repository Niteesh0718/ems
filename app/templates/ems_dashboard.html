{% extends 'navbar.html' %}
{% load static %}


{% block content %}
<style>
  body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #7f5cff, #2b1f4a 60%);
}
 .events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px;
  padding: 40px;
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  margin: 30px;
}

  .event-card-link {
    text-decoration: none;
  }

  .event-card {
    position: relative;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(8px);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(59, 130, 246, 0.15);
    box-shadow: 0 8px 22px rgba(2, 6, 23, 0.12);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    cursor: pointer;

    /* ✅ added */
    height: 320px;
    display: flex;
    flex-direction: column;
  }

  .event-card:hover {
    transform: translateY(-8px) scale(1.015);
    box-shadow: 0 18px 40px rgba(59, 130, 246, 0.25);
  }

  .event-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .event-card:hover img {
    transform: scale(1.06);
  }

  .event-info {
    padding: 16px 18px 20px;
    color: #0f172a;

    /* ✅ added */
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .event-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .event-meta {
    font-size: 0.85rem;
    color: #475569;
    margin-top: 4px;
  }

  .event-card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(120deg, rgba(56, 189, 248, 0.25), rgba(59, 130, 246, 0.25));
    opacity: 0;
    transition: opacity 0.35s ease;
    pointer-events: none;
  }

  .event-card:hover::after {
    opacity: 1;
  }

  .events-title {
    text-align: center;
    color: #0f172a;
    margin: 30px 0 10px;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    animation: fadeInDown 0.8s ease forwards;
  }

  .events-title::after {
    content: "";
    display: block;
    width: 72px;
    height: 4px;
    margin: 10px auto 0;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #3b82f6);
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.35);
  }

  @keyframes fadeInDown {
    from {
      opacity: 0;
      transform: translateY(-12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
<h1 class="events-title">Events</h1>

<div id="events-container" class="events-grid"></div>
<script src="{% static 'get_event.js' %}"></script>
{% endblock %}
