{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EMS Dashboard</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", system-ui, sans-serif;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #f8fafc, #eef2f7);
    padding-top: 70px;
  }

  /* Full-width Fixed Navbar */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 14px 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    z-index: 9999;
  }

  /* Inner container */
  .nav-content {
    width: 100%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-radius: 12px;
    border: 1px solid rgba(56, 189, 248, 0.25);
    background: linear-gradient(
      145deg,
      rgba(56, 189, 248, 0.10),
      rgba(59, 130, 246, 0.05)
    );
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .nav-content:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
  }

  .logo {
    text-decoration: none;
    color: #e5f2ff;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 1.05rem;
    cursor: pointer;
    transition: transform 0.25s ease, text-shadow 0.25s ease, color 0.25s ease;
  }

  .logo:hover {
    transform: scale(1.06);
    color: #ffffff;
    text-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
  }

  .nav-links {
    display: flex;
    gap: 28px;
  }

  .nav-links a {
    text-decoration: none;
    color: #cfe7ff;
    font-size: 0.95rem;
    opacity: 0.9;
    position: relative;
    padding-bottom: 6px;
    transition: opacity 0.25s ease, transform 0.25s ease, color 0.25s ease;
  }

  .nav-links a:hover {
    opacity: 1;
    transform: translateY(-2px);
    color: #ffffff;
  }

  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #3b82f6);
    transition: width 0.35s ease;
  }

  .nav-links a:hover::after {
    width: 100%;
  }

  @media (max-width: 600px) {
    .navbar {
      padding: 12px 16px;
    }

    .nav-links {
      gap: 18px;
    }
  }
</style>
</head>
<body>

  <nav class="navbar">
  <div class="nav-content">
    <a class="logo" href="/ems_dashboard/">EMS</a>
    <div class="nav-links">
      <a href="/ems_dashboard/bookings/">my bookings</a>
      <a href="/ems_dashboard/profile/">profile</a>
    </div>
  </div>
</nav>

{% block content %}
{% endblock %}
</body>
</html>
